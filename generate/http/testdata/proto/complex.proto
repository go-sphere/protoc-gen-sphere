syntax = "proto3";

package testdata.complex.v1;

import "google/api/annotations.proto";
import "sphere/binding/binding.proto";

option go_package = "github.com/go-sphere/protoc-gen-sphere/generate/http/testdata/gen/complexv1;complexv1";

service ComplexService {
  // GetItem fetches an item by id.
  rpc GetItem(GetItemRequest) returns (GetItemResponse) {
    option (google.api.http) = {
      get: "/api/items/{id}"
      additional_bindings {get: "/api/v2/items/{id}"}
    };
  }

  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse) {
    option (google.api.http) = {
      put: "/api/items/{id}"
      body: "item"
      response_body: "item"
    };
  }
}

message Item {
  string name = 1;
  int64 value = 2;
}

message GetItemRequest {
  string id = 1 [(sphere.binding.location) = BINDING_LOCATION_URI];
}

message GetItemResponse {
  Item item = 1;
}

message UpdateItemRequest {
  string id = 1 [(sphere.binding.location) = BINDING_LOCATION_URI];
  Item item = 2;
}

message UpdateItemResponse {
  Item item = 1;
}
